version: 2
updates:
  # 1. Keep your Go modules (libraries) secure and updated
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly" # Checks once a week so you don't get spammed daily
    labels:
      - "dependencies"
      - "go"

  # 2. Keep your CI pipeline tools (like actions/checkout) updated
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"